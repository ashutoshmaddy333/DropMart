# DropMart — Kubernetes + Cloudflare Load Balancing
#
# Architecture:
#   Cloudflare (DNS + CDN + DDoS + SSL termination at edge)
#     → NGINX Ingress Controller (path-based routing inside cluster)
#       → K8s Services (ClusterIP load balancing to pods)
#
# No separate API gateway product needed (Kong/Traefik optional later).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dropmart-ingress
  namespace: dropmart
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: "api-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Cloudflare real IP (when proxied through Cloudflare)
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  rules:
    - host: dropmart.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 4000
          - path: /tracking
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 3000
    - host: api.dropmart.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: dropmart
spec:
  selector:
    app: dropmart-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: dropmart
spec:
  selector:
    app: dropmart-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dropmart-api
  namespace: dropmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dropmart-api
  template:
    metadata:
      labels:
        app: dropmart-api
    spec:
      containers:
        - name: api
          image: dropmart/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: dropmart-api-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dropmart-web
  namespace: dropmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dropmart-web
  template:
    metadata:
      labels:
        app: dropmart-web
    spec:
      containers:
        - name: web
          image: dropmart/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.dropmart.in/api/v1"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
